name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (ruff + alembic + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.3"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run --frozen ruff check .

      - name: Type check (mypy)
        run: uv run --frozen mypy app

      - name: Migrations apply cleanly
        run: uv run --frozen alembic upgrade head
        env:
          DATABASE_URL: sqlite:///./ci_migrations.db

      - name: Run tests
        run: uv run --frozen pytest

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.3"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install backend deps
        working-directory: backend
        run: uv sync --frozen

      - name: Prepare DB and start backend
        working-directory: backend
        run: |
          uv run --frozen alembic upgrade head
          uv run --frozen python seed_data.py
          uv run --frozen uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break || sleep 1
          done

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        working-directory: frontend
        run: npm run test:e2e

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t fashop-backend:ci .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t fashop-frontend:ci ./frontend
